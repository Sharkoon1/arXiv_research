name: arxiv_research
description: Personal ML/AI research paper reader — minimal, delightful.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  http: ^1.2.1

  # XML parsing (ArXiv returns Atom/XML)
  xml: ^6.5.0

  # Local persistence
  hive_ce_flutter: ^1.0.0

  # Open URLs / PDFs in browser
  url_launcher: ^6.3.0

  # Immutable models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Animations
  flutter_animate: ^4.5.0

  # Typography
  google_fonts: ^6.2.1

  # Shared preferences for read status
  shared_preferences: ^2.3.2

  # Markdown rendering
  flutter_markdown: ^0.7.4+3

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  freezed: ^2.5.2
  hive_ce_generator: ^1.0.0
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
